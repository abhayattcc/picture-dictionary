<script>
    var gk_isXlsx = false;
var gk_xlsxFileLookup = {};
var gk_fileData = {};
var imageVisibility = {};
var cachedImages = {};

function filledCell(cell) {
    return cell !== '' && cell != null;
}

function loadFileData(filename) {
    if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
        try {
            var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
            var firstSheetName = workbook.SheetNames[0];
            var worksheet = workbook.Sheets[firstSheetName];
            var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
            var filteredData = jsonData.filter(row => row.some(filledCell));
            var headerRowIndex = filteredData.findIndex((row, index) =>
                row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
            );
            if (headerRowIndex === -1 || headerRowIndex > 25) {
                headerRowIndex = 0;
            }
            var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex));
            csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
            return csv;
        } catch (e) {
            console.error(e);
            return "";
        }
    }
    return gk_fileData[filename] || "";
}

let dbEnglishOdia, dbOdiaMeaning, dbEnglishHindi;
let defaultEnglishVoice, defaultHindiVoice, defaultOdiaVoice;
let debounceTimer;
let pdfDoc = null;
let currentPageIndex = 0;
let textPages = [];

let currentSentenceIndex = -1;
let sentences = [];

let lastTappedSentenceIndex = -1;

const cacheName = 'kids-word-adventure-cache-v2';
const dbFiles = {
    english_odia: 'https://raw.githubusercontent.com/abhayattcc/Best-odia-dictionary/refs/heads/main/data/english_odia.db.gz',
    odia_meaning: 'https://raw.githubusercontent.com/abhayattcc/Best-odia-dictionary/refs/heads/main/data/odia_meaning.db.gz',
    english_hindi: 'https://raw.githubusercontent.com/abhayattcc/Best-odia-dictionary/refs/heads/main/data/english_hindi.db.gz'

const filesToCache = [
    'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.wasm',

    ...Object.values(dbFiles)
];

let isTTSSupported = 'speechSynthesis' in window;
let fullScreenImage = null;

function showProgress(message, percentage) {
    const progressContainer = document.getElementById('progress-container');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    progressContainer.classList.add('visible');
    progressFill.style.width = `${percentage}%`;
    progressText.textContent = `${message} (${percentage}%)`;
}

function hideProgress() {
    document.getElementById('progress-container').classList.remove('visible');
}

async function isCachePopulated() {
    try {
        const cache = await caches.open(cacheName);
        const cachedRequests = await cache.keys();
        const cachedUrls = cachedRequests.map(req => req.url);
        return filesToCache.every(url => cachedUrls.includes(url));
    } catch (error) {
        console.error('Error checking cache:', error);
        return false;
    }
}

async function cacheFiles() {
    try {
        const cache = await caches.open(cacheName);
        const cachedRequests = await cache.keys();
        const cachedUrls = cachedRequests.map(req => req.url);
        const filesToFetch = filesToCache.filter(url => !cachedUrls.includes(url));

        if (filesToFetch.length > 0) {
            showProgress('Caching resources', 0);
            const totalFiles = filesToFetch.length;
            let loadedFiles = 0;

            for (const file of filesToFetch) {
                try {
                    const response = await fetch(file);
                    if (!response.ok) throw new Error(`Failed to fetch ${file}`);
                    await cache.put(file, response.clone());
                    loadedFiles++;
                    showProgress('Caching resources', Math.round((loadedFiles / totalFiles) * 100));
                } catch (error) {
                    console.error(`Error caching ${file}:`, error);
                }
            }
            hideProgress();
            localStorage.setItem('cachePopulated', 'true');
        }
    } catch (error) {
        console.error('Error opening cache:', error);
        hideProgress();
    }
}

async function cacheImage(url) {
    if (!url) return null;
    try {
        const cache = await caches.open(cacheName);
        let cachedResponse = await cache.match(url);
        if (cachedResponse) {
            const blob = await cachedResponse.blob();
            cachedImages[url] = URL.createObjectURL(blob);
            return cachedImages[url];
        }
        const response = await fetch(url);
        if (!response.ok) throw new Error(`Failed to fetch image ${url}`);
        await cache.put(url, response.clone());
        const blob = await response.blob();
        cachedImages[url] = URL.createObjectURL(blob);
        localStorage.setItem('cachedImages', JSON.stringify(Object.keys(cachedImages)));
        return cachedImages[url];
    } catch (error) {
        console.error(`Error caching image ${url}:`, error);
        return null;
    }
}

async function loadResource(url) {
    try {
        const cache = await caches.open(cacheName);
        const cachedResponse = await cache.match(url);
        if (cachedResponse) return cachedResponse;

        const response = await fetch(url);
        if (!response.ok) throw new Error(`Failed to fetch ${url}`);
        await cache.put(url, response.clone());
        return response;
    } catch (error) {
        console.error(`Error loading ${url}:`, error);
        throw error;
    }
}

async function initDatabases() {
    try {
        const SQL = await initSqlJs({
            locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
        });

        const loadDatabase = async (url) => {
            const response = await loadResource(url);
            const arrayBuffer = await response.arrayBuffer();
            const decompressed = pako.ungzip(new Uint8Array(arrayBuffer));
            return new SQL.Database(decompressed);
        };

        showProgress('Loading dictionaries', 0);
        dbEnglishOdia = await loadDatabase(dbFiles.english_odia);
        showProgress('Loading dictionaries', 33);
        dbOdiaMeaning = await loadDatabase(dbFiles.odia_meaning);
        showProgress('Loading dictionaries', 66);
        dbEnglishHindi = await loadDatabase(dbFiles.english_hindi);
        showProgress('Loading dictionaries', 100);
        hideProgress();
    } catch (error) {
        console.error('Error loading databases:', error);
        document.getElementById('results').innerHTML = 'Error loading dictionaries. Please check your internet connection.';
        hideProgress();
    }
}

function trimInput(input) {
    return input.trim().toLowerCase();
}

function filterTextByLanguage(text, lang) {
    if (typeof text !== 'string' || typeof lang !== 'string') {
        return '';
    }

    const languagePatterns = {
        or: /[\u0B00-\u0B7F\.":;!?() ]+/g,
        hi: /[\u0900-\u097F\A-Za-z0-9]+/g,
        en: /[]+/g
    };

    const langKey = lang.toLowerCase().slice(0, 2);
    if (!languagePatterns[langKey]) {
        return '';
    }

    return (text.match(languagePatterns[langKey]) || []).join(' ').trim();
}

function stemEnglishWord(word) {
    const suffixes = ['s', 'es', 'ed', 'ing', 'ly', 'er', 'est'];
    let stemmed = word.toLowerCase();
    for (const suffix of suffixes) {
        if (stemmed.endsWith(suffix)) {
            stemmed = stemmed.slice(0, -suffix.length);
            break;
        }
    }
    if (stemmed.endsWith('p') && word.endsWith('ps')) {
        stemmed = stemmed + 'e';
    }
    return stemmed;
}

function stemOdiaWord(word) {
    const suffixes = ['ର', 'କରିବା', 'ମାନେ', 'ଗୁଡ଼ିକ', 'ଟି', 'ମାନ'];
    let stemmed = word;
    for (const suffix of suffixes) {
        if (stemmed.endsWith(suffix)) {
            stemmed = stemmed.slice(0, -suffix.length);
            break;
        }
    }
    return stemmed;
}

function stemHindiWord(word) {
    const suffixes = ['ों', 'ें', 'ी', 'ा', 'े', 'ों', 'ने', 'कर', 'ता', 'ती', 'नेवाला'];
    let stemmed = word;
    for (const suffix of suffixes) {
        if (stemmed.endsWith(suffix)) {
            stemmed = stemmed.slice(0, -suffix.length);
            break;
        }
    }
    return stemmed;
}

function saveCustomEntry(word, english, odia, odia_spelling, odia_meaning, targetElement, imageBase64 = '') {

}

function speakResults() {
    if (!isTTSSupported) return;
    if (!resultText) {
        alert("No text available.");
        return;
    }
    stopSpeech();
    const voiceMap = {
        'or': defaultOdiaVoice,
        'hi': defaultHindiVoice,
        'en': defaultEnglishVoice
    };
    speechUtterances = [];
    activeUtterances = 0;
    ['or', 'hi', 'en'].forEach(langPrefix => {
        const filteredText = filterTextByLanguage(resultText, langPrefix);
        if (filteredText) {
            const voice = voiceMap[langPrefix];
            if (voice) {
                const utterance = new SpeechSynthesisUtterance(filteredText);
                utterance.voice = voice;
                utterance.lang = voice.lang;
                utterance.rate = 0.7;
                utterance.pitch = 1.0;
                utterance.volume = 1.0;
                utterance.onend = () => {
                    activeUtterances--;
                    if (activeUtterances === 0) {
                        document.getElementById('result-speak').disabled = false;
                        document.getElementById('result-stop').disabled = true;
                    }
                };
                speechUtterances.push(utterance);
                activeUtterances++;
            }
        }
    });
    if (activeUtterances > 0) {
        speechUtterances.forEach(utterance => window.speechSynthesis.speak(utterance));
        document.getElementById('result-speak').disabled = true;
        document.getElementById('result-stop').disabled = false;
    } else {
        document.getElementById('result-speak').disabled = false;
        document.getElementById('result-stop').disabled = true;
    }
}

function toggleOdiaMeaning(element) {
    const odiaMeaningDiv = element.nextElementSibling;
    if (odiaMeaningDiv.style.display === 'none' || odiaMeaningDiv.style.display === '') {

        element.textContent = 'Show Odia Meaning ►';
    }
}

async function searchWord(word, targetElement = document.getElementById('results')) {
    word = trimInput(word);
    targetElement.innerHTML = '';
    const suggestionsUl = targetElement === document.getElementById('results') 
        ? document.getElementById('suggestions') 
        : document.getElementById('popup-content');
    const dictionarySection = document.getElementById('dictionary-section');
    const editDictionaryBtn = document.getElementById('edit-dictionary-btn');
    const editDictionaryForm = document.getElementById('edit-dictionary-form');

    suggestionsUl.classList.remove('visible');
    suggestionsUl.classList.add('hidden');
    editDictionaryBtn.classList.add('hidden');
    editDictionaryForm.classList.add('hidden');

    if (!word) {
        return;
    }

    let entries = [];
    const stemmedEnglish = stemEnglishWord(word);
    const stemmedOdia = stemOdiaWord(word);
    const stemmedHindi = stemHindiWord(word);

    // Check custom dictionary
    const customDictionary = JSON.parse(localStorage.getItem('customDictionary') || '{}');
    if (customDictionary[word]) {
        entries.push(customDictionary[word]);
    }

    // Query databases for exact and stemmed matches
    if (dbEnglishOdia) {
        let stmt = dbEnglishOdia.prepare("SELECT English, odia FROM dictionary WHERE LOWER(English) = ? OR LOWER(odia) = ?");
        stmt.bind([word, word]);
        while (stmt.step()) {
            const row = stmt.getAsObject();
            entries.push({ English: row.English, odia: row.odia });
        }
        stmt.free();

        if (stemmedEnglish !== word) {
            stmt = dbEnglishOdia.prepare("SELECT English, odia FROM dictionary WHERE LOWER(English) LIKE ?");
            stmt.bind([`%${stemmedEnglish}%`]);
            while (stmt.step()) {
                const row = stmt.getAsObject();
                if (stemEnglishWord(row.English) === stemmedEnglish) {
                    entries.push({ English: row.English, odia: row.odia });
                }
            }
            stmt.free();
        }
        if (stemmedOdia !== word) {
            stmt = dbEnglishOdia.prepare("SELECT English, odia FROM dictionary WHERE LOWER(odia) LIKE ?");
            stmt.bind([`%${stemmedOdia}%`]);
            while (stmt.step()) {
                const row = stmt.getAsObject();
                if (stemOdiaWord(row.odia) === stemmedOdia) {
                    entries.push({ English: row.English, odia: row.odia });
                }
            }
            stmt.free();
        }
    }

    if (dbEnglishHindi) {
        let stmt = dbEnglishHindi.prepare("SELECT English, hindi, image FROM dictionary WHERE LOWER(English) = ? OR LOWER(hindi) = ?");
        stmt.bind([word, word]);
        while (stmt.step()) {
            const row = stmt.getAsObject();
            const existingEntry = entries.find(e => e.English === row.English);
            if (existingEntry) {
                existingEntry.hindi = row.hindi;
                existingEntry.image = row.image;
            } else {
                entries.push({ English: row.English, hindi: row.hindi, image: row.image });
            }
        }
        stmt.free();

        if (stemmedEnglish !== word) {
            stmt = dbEnglishHindi.prepare("SELECT English, hindi, image FROM dictionary WHERE LOWER(English) LIKE ?");
            stmt.bind([`%${stemmedEnglish}%`]);
            while (stmt.step()) {
                const row = stmt.getAsObject();
                if (stemEnglishWord(row.English) === stemmedEnglish) {
                    const existingEntry = entries.find(e => e.English === row.English);
                    if (existingEntry) {
                        existingEntry.hindi = row.hindi;
                        existingEntry.image = row.image;
                    } else {
                        entries.push({ English: row.English, hindi: row.hindi, image: row.image });
                    }
                }
            }
            stmt.free();
        }
        if (stemmedHindi !== word) {
            stmt = dbEnglishHindi.prepare("SELECT English, hindi, image FROM dictionary WHERE LOWER(hindi) LIKE ?");
            stmt.bind([`%${stemmedHindi}%`]);
            while (stmt.step()) {
                const row = stmt.getAsObject();
                if (stemHindiWord(row.hindi) === stemmedHindi) {
                    const existingEntry = entries.find(e => e.English === row.English);
                    if (existingEntry) {
                        existingEntry.hindi = row.hindi;
                        existingEntry.image = row.image;
                    } else {
                        entries.push({ English: row.English, hindi: row.hindi, image: row.image });
                    }
                }
            }
            stmt.free();
        }
    }

    if (dbOdiaMeaning) {
        let stmt = dbOdiaMeaning.prepare("SELECT odia, odia_spelling, odia_meaning FROM dictionary WHERE LOWER(odia) = ? OR LOWER(odia_spelling) = ?");
        stmt.bind([word, word]);
        while (stmt.step()) {
            const row = stmt.getAsObject();
            const existingEntry = entries.find(e => e.odia === row.odia);
            if (existingEntry) {
                existingEntry.odia_spelling = row.odia_spelling;
                existingEntry.odia_meaning = row.odia_meaning;
            } else {
                entries.push({ odia: row.odia, odia_spelling: row.odia_spelling, odia_meaning: row.odia_meaning });
            }
        }
        stmt.free();

        if (stemmedOdia !== word) {
            stmt = dbOdiaMeaning.prepare("SELECT odia, odia_spelling, odia_meaning FROM dictionary WHERE LOWER(odia) LIKE ? OR LOWER(odia_spelling) LIKE ?");
            stmt.bind([`%${stemmedOdia}%`, `%${stemmedOdia}%`]);
            while (stmt.step()) {
                const row = stmt.getAsObject();
                if (stemOdiaWord(row.odia) === stemmedOdia || stemOdiaWord(row.odia_spelling) === stemmedOdia) {
                    const existingEntry = entries.find(e => e.odia === row.odia);
                    if (existingEntry) {
                        existingEntry.odia_spelling = row.odia_spelling;
                        existingEntry.odia_meaning = row.odia_meaning;
                    } else {
                        entries.push({ odia: row.odia, odia_spelling: row.odia_spelling, odia_meaning: row.odia_meaning });
                    }
                }
            }
            stmt.free();
        }
    }

    // Merge entries to avoid duplicates
    const mergedEntries = [];
    const seen = new Set();
    for (let entry of entries) {
        const key = `${entry.English || ''}|${entry.odia || ''}|${entry.hindi || ''}`;
        if (!seen.has(key)) {
            seen.add(key);
            mergedEntries.push({
                English: entry.English || '',
                hindi: entry.hindi || '',
                odia: entry.odia || '',
                odia_spelling: entry.odia_spelling || '',
                odia_meaning: entry.odia_meaning || '',
                image: entry.image || ''
            });
        }
    }

    // Select the best entry (prioritize exact match or custom dictionary)
    let bestEntry = mergedEntries.find(entry => 
        entry.English.toLowerCase() === word ||
        entry.odia.toLowerCase() === word ||
        entry.hindi.toLowerCase() === word ||
        entry.odia_spelling.toLowerCase() === word ||
        customDictionary[word]
    ) || mergedEntries[0];

    let speakText = '';
    if (bestEntry) {
        // Fill missing fields for the best entry
        if (bestEntry.English && !bestEntry.odia && dbEnglishOdia) {
            let stmt = dbEnglishOdia.prepare("SELECT odia FROM dictionary WHERE LOWER(English) = ?");
            stmt.bind([bestEntry.English.toLowerCase()]);
            while (stmt.step()) {
                bestEntry.odia = bestEntry.odia || stmt.getAsObject().odia;
            }
            stmt.free();
        }

        if (bestEntry.English && !bestEntry.hindi && dbEnglishHindi) {
            let stmt = dbEnglishHindi.prepare("SELECT hindi, image FROM dictionary WHERE LOWER(English) = ?");
            stmt.bind([bestEntry.English.toLowerCase()]);
            while (stmt.step()) {
                const row = stmt.getAsObject();
                bestEntry.hindi = bestEntry.hindi || row.hindi;
                bestEntry.image = bestEntry.image || row.image;
            }
            stmt.free();
        }

        if (bestEntry.odia && !bestEntry.English && dbEnglishOdia) {
            let stmt = dbEnglishOdia.prepare("SELECT English FROM dictionary WHERE LOWER(odia) = ?");
            stmt.bind([bestEntry.odia.toLowerCase()]);
            while (stmt.step()) {
                bestEntry.English = bestEntry.English || stmt.getAsObject().English;
                if (bestEntry.English && !bestEntry.hindi && dbEnglishHindi) {
                    let stmt2 = dbEnglishHindi.prepare("SELECT hindi, image FROM dictionary WHERE LOWER(English) = ?");
                    stmt2.bind([bestEntry.English.toLowerCase()]);
                    while (stmt2.step()) {
                        const row = stmt2.getAsObject();
                        bestEntry.hindi = bestEntry.hindi || row.hindi;
                        bestEntry.image = bestEntry.image || row.image;
                    }
                    stmt2.free();
                }
            }
            stmt.free();
        }

        if (bestEntry.odia && (!bestEntry.odia_spelling || !bestEntry.odia_meaning) && dbOdiaMeaning) {
            let stmt = dbOdiaMeaning.prepare("SELECT odia_spelling, odia_meaning FROM dictionary WHERE LOWER(odia) = ?");
            stmt.bind([bestEntry.odia.toLowerCase()]);
            while (stmt.step()) {
                const row = stmt.getAsObject();
                bestEntry.odia_spelling = bestEntry.odia_spelling || row.odia_spelling;
                bestEntry.odia_meaning = bestEntry.odia_meaning || row.odia_meaning;
            }
            stmt.free();
        }

        let mainParts = [];
        if (bestEntry.odia) mainParts.push(` ${bestEntry.odia}`);
        if (bestEntry.odia_spelling) mainParts.push(` ${bestEntry.odia_spelling}`);
        if (bestEntry.hindi) mainParts.push(` ${bestEntry.hindi}`);
        if (bestEntry.English) mainParts.push(` ${bestEntry.English}`);
        let odiaMeaningPart = bestEntry.odia_meaning ? `<div class="odia-meaning-toggle" onclick="toggleOdiaMeaning(this)">Show Odia Meaning ►</div><div class="odia-meaning" style="display: none;">${bestEntry.odia_meaning}</div>` : '';
        let imagePart = '';
        let buttonPart = '';
        if (bestEntry.image) {
            const isVisible = imageVisibility[word] !== false;
            const imageSrc = cachedImages[bestEntry.image] || bestEntry.image;
            imagePart = `<div class="dictionary-image" style="margin-top: 10px; display: ${isVisible ? 'block' : 'none'};"><img src="${imageSrc}" style="max-width: 90%; max-height: 400px; display: block; margin: 0 auto; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2);"></div>`;
            buttonPart = `<div class="image-controls" style="margin-top: 10px; text-align: center;"><button class="hide-image-btn" style="display: ${isVisible ? 'inline-block' : 'none'};" onclick="hideImage('${word}', this)">Delete Image</button><button class="show-image-btn" style="display: ${isVisible ? 'none' : 'inline-block'};" onclick="showImage('${word}', this)">Restore Image</button></div>`;
        }
        const displayText = `<div class="dictionary-entry"><div class="dictionary-text">${mainParts.join(' | ') + (odiaMeaningPart ? `<br>${odiaMeaningPart}` : '')}</div>${imagePart ? `<br>${imagePart}` : ''}${buttonPart ? `<br>${buttonPart}` : ''}</div>`;

        speakText = [bestEntry.odia, bestEntry.odia_spelling, bestEntry.hindi, bestEntry.English, bestEntry.odia_meaning].filter(Boolean).join(' | ');

        if (targetElement === document.getElementById('results')) {
            targetElement.innerHTML = `<div>${displayText}</div>`;
            resultText = speakText;
            document.getElementById('results').style.display = 'block';
            document.getElementById('suggestions').classList.remove('visible');
            document.getElementById('suggestions').classList.add('hidden');
            if (isTTSSupported) {
                document.getElementById('result-speak').classList.remove('tts-hidden');
                document.getElementById('result-stop').classList.remove('tts-hidden');
                document.getElementById('result-speak').disabled = false;
                document.getElementById('result-stop').disabled = true;
                speakResults();
            } else {
                document.getElementById('result-speak').classList.add('tts-hidden');
                document.getElementById('result-stop').classList.add('tts-hidden');
            }
            if (customDictionary[word]) {
                const deleteEntryBtn = document.createElement('button');
                deleteEntryBtn.textContent = 'Delete Entry';
                deleteEntryBtn.onclick = () => {
                    delete customDictionary[word];
                    localStorage.setItem('customDictionary', JSON.stringify(customDictionary));
                    searchWord(word);
                };
                targetElement.appendChild(deleteEntryBtn);
            }
        } else {
            targetElement.innerHTML = `<div>${displayText}</div>`;
            document.getElementById('popup-speak').setAttribute('data-word', speakText);
            if (isTTSSupported) {
                document.getElementById('popup-speak').classList.remove('tts-hidden');
                document.getElementById('popup-stop').classList.remove('tts-hidden');
                document.getElementById('popup-speak').disabled = false;
                document.getElementById('popup-stop').disabled = true;
            } else {
                document.getElementById('popup-speak').classList.add('tts-hidden');
                document.getElementById('popup-stop').classList.add('tts-hidden');
            }
        }

        // Cache image for offline use
        if (bestEntry.image && !bestEntry.image.startsWith('data:') && !cachedImages[bestEntry.image]) {
            const imageUrl = await cacheImage(bestEntry.image);
            if (imageUrl) {
                const imgElements = targetElement.querySelectorAll(`img[src="${bestEntry.image}"]`);
                imgElements.forEach(img => img.src = imageUrl);
            }
        }

        // Add double-tap and dblclick for images
        const images = targetElement.querySelectorAll('.dictionary-image img');
        images.forEach(img => {
            let lastTap = 0;
            img.addEventListener('touchstart', (e) => {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                if (tapLength < 300 && tapLength > 0) {
                    showFullScreenImage(img.src);
                    e.preventDefault();
                }
                lastTap = currentTime;
            });
            img.addEventListener('dblclick', () => showFullScreenImage(img.src));
        });
    } else {
        let notFoundMessage = '';
        if (targetElement === document.getElementById('results')) {
            notFoundMessage = 'ଆମେ ଆପଣଙ୍କ ଶବ୍ଦ ଖୋଜିପାରୁନାହିଁ, ଦୟା କରି ଭଲରେ ଶବ୍ଦ ଖୋଜନ୍ତୁ.';
            targetElement.innerHTML = `<div>${notFoundMessage}</div>`;
            resultText = notFoundMessage;
            document.getElementById('results').style.display = 'block';
            document.getElementById('suggestions').classList.remove('visible');
            document.getElementById('suggestions').classList.add('hidden');
            if (isTTSSupported) {
                document.getElementById('result-speak').classList.remove('tts-hidden');
                document.getElementById('result-stop').classList.remove('tts-hidden');
                document.getElementById('result-speak').disabled = false;
                document.getElementById('result-stop').disabled = true;
                if (defaultOdiaVoice) {
                    stopSpeech();
                    const utterance = new SpeechSynthesisUtterance(notFoundMessage);
                    utterance.voice = defaultOdiaVoice;
                    utterance.lang = defaultOdiaVoice.lang;
                    utterance.rate = 0.8;
                    utterance.pitch = 1.0;
                    utterance.volume = 1.0;
                    utterance.onend = () => {
                        document.getElementById('result-speak').disabled = false;
                        document.getElementById('result-stop').disabled = true;
                    };
                    speechUtterances = [utterance];
                    window.speechSynthesis.speak(utterance);
                    document.getElementById('result-speak').disabled = true;
                    document.getElementById('result-stop').disabled = false;
                }
            } else {
                document.getElementById('result-speak').classList.add('tts-hidden');
                document.getElementById('result-stop').classList.add('tts-hidden');
            }
            editDictionaryBtn.classList.remove('hidden');
        } else {
            notFoundMessage = 'Word not found.';
            targetElement.innerHTML = `<div>${notFoundMessage}</div>`;
            document.getElementById('popup-speak').setAttribute('data-word', notFoundMessage);
            if (isTTSSupported) {
                document.getElementById('popup-speak').classList.remove('tts-hidden');
                document.getElementById('popup-stop').classList.remove('tts-hidden');
                document.getElementById('popup-speak').disabled = false;
                document.getElementById('popup-stop').disabled = true;
            } else {
                document.getElementById('popup-speak').classList.add('tts-hidden');
                document.getElementById('popup-stop').classList.add('tts-hidden');
            }
        }
    }

    if (targetElement === document.getElementById('popup-content')) {
        if (isTTSSupported) {
            document.getElementById('popup-speak').disabled = false;
            document.getElementById('popup-stop').disabled = true;
        }
    }
}

            while (stmt.step()) {
                const row = stmt.getAsObject();

                    if (row.hindi) suggestions.push(row.hindi);
                    if (row.image && cachedImages[row.image]) {
                        suggestions.push(`<img src="${cachedImages[row.image]}" style="max-width: 200px; max-height: 200px; vertical-align: middle; margin-left: 10px; border-radius: 5px;">`);
                    } else if (row.image) {
                        suggestions.push(`<img src="${row.image}" style="max-width: 200px; max-height: 200px; vertical-align: middle; margin-left: 10px; border-radius: 5px;">`);
                    }
                }
            }
            stmt.free();
        }
    }

    if (dbOdiaMeaning) {
        let stmt = dbOdiaMeaning.prepare("SELECT odia, odia_spelling FROM dictionary WHERE LOWER(odia) LIKE ? OR LOWER(odia_spelling) LIKE ? LIMIT 10");
        stmt.bind([`%${word}%`, `%${word}%`]);
        while (stmt.step()) {
            const row = stmt.getAsObject();
            if (row.odia) suggestions.push(row.odia);
            if (row.odia_spelling) suggestions.push(row.odia_spelling);
        }
        stmt.free();

        if (stemmedOdia !== word) {
            stmt = dbOdiaMeaning.prepare("SELECT odia, odia_spelling FROM dictionary WHERE LOWER(odia) LIKE ? OR LOWER(odia_spelling) LIKE ? LIMIT 10");
            stmt.bind([`%${stemmedOdia}%`, `%${stemmedOdia}%`]);
            while (stmt.step()) {
                const row = stmt.getAsObject();
                if (stemOdiaWord(row.odia) === stemmedOdia || stemOdiaWord(row.odia_spelling) === stemmedOdia) {
                    if (row.odia) suggestions.push(row.odia);
                    if (row.odia_spelling) suggestions.push(row.odia_spelling);
                }
            }
            stmt.free();
        }
    }

    let exactMatch = null;
    if (customDictionary[word]) {
        const entry = customDictionary[word];
        [entry.English, entry.odia, entry.odia_spelling, entry.hindi].forEach(s => {
            if (s && s.toLowerCase() === word) {
                exactMatch = s;
            }
        });
    }
    if (!exactMatch && dbEnglishOdia) {
        let stmt = dbEnglishOdia.prepare("SELECT English, odia FROM dictionary WHERE LOWER(English) = ? OR LOWER(odia) = ?");
        stmt.bind([word, word]);
        while (stmt.step()) {
            const row = stmt.getAsObject();
            if (row.English.toLowerCase() === word) exactMatch = row.English;
            else if (row.odia.toLowerCase() === word) exactMatch = row.odia;
        }
        stmt.free();
    }
    if (!exactMatch && dbEnglishHindi) {
        let stmt = dbEnglishHindi.prepare("SELECT English, hindi, image FROM dictionary WHERE LOWER(English) = ? OR LOWER(hindi) = ?");
        stmt.bind([word, word]);
        while (stmt.step()) {
            const row = stmt.getAsObject();
            if (row.English.toLowerCase() === word) exactMatch = row.English;
            else if (row.hindi.toLowerCase() === word) exactMatch = row.hindi;
        }
        stmt.free();
    }
    if (!exactMatch && dbOdiaMeaning) {
        let stmt = dbOdiaMeaning.prepare("SELECT odia, odia_spelling FROM dictionary WHERE LOWER(odia) = ? OR LOWER(odia_spelling) = ?");
        stmt.bind([word, word]);
        while (stmt.step()) {
            const row = stmt.getAsObject();
            if (row.odia.toLowerCase() === word) exactMatch = row.odia;
            else if (row.odia_spelling.toLowerCase() === word) exactMatch = row.odia_spelling;
        }
        stmt.free();
    }

    suggestions = [...new Set(suggestions)];
    if (exactMatch) {
        suggestions = suggestions.filter(s => !s.startsWith('<img') && s.toLowerCase() !== exactMatch.toLowerCase());
        suggestions.unshift(exactMatch);
    }
    suggestions = suggestions.slice(0, 10);

    if (suggestions.length > 0) {
        targetElement.innerHTML = suggestions.map(s => 
            `<li onclick="selectSuggestion('${s.replace(/'/g, "\\'")}', ${targetElement === document.getElementById('suggestions') ? 'true' : 'false'})">${s}</li>`
        ).join('');
        targetElement.classList.remove('hidden');
        targetElement.classList.add('visible');
        if (targetElement === document.getElementById('suggestions')) {
            document.getElementById('results').style.display = 'none';
        }
    } else {
        targetElement.classList.remove('visible');
        targetElement.classList.add('hidden');
        if (targetElement === document.getElementById('suggestions')) {
            document.getElementById('results').style.display = 'block';
            searchWord(word);
        } else {
            targetElement.innerHTML = `<div>No suggestions found.</div>`;
        }
    }
}

function selectSuggestion(word, isDictionarySection) {

        document.getElementById('searchInput').value = word;
        searchWord(word);
        const suggestionsUl = document.getElementById('suggestions');
        suggestionsUl.classList.remove('visible');
        suggestionsUl.classList.add('hidden');
    } else {
        const popupContent = document.getElementById('popup-content');
        searchWord(word, popupContent);
    }
}

function debounce(func, wait) {
    return function(...args) {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => func.apply(this, args), wait);
    };
}

function saveLastTappedPosition(fileName, sentenceIndex, pageIndex) {
    const positionData = JSON.parse(localStorage.getItem('lastTappedPositions') || '{}');
    positionData[fileName] = { sentenceIndex, pageIndex };
    localStorage.setItem('lastTappedPositions', JSON.stringify(positionData));
}

function loadLastTappedPosition(fileName) {
    const positionData = JSON.parse(localStorage.getItem('lastTappedPositions') || '{}');
    return positionData[fileName] || null;
}

function clearLastTappedPosition(fileName) {
    const positionData = JSON.parse(localStorage.getItem('lastTappedPositions') || '{}');
    delete positionData[fileName];
    localStorage.setItem('lastTappedPositions', JSON.stringify(positionData));
}

function getDistance(touches) {
    const dx = touches[0].pageX - touches[1].pageX;
    const dy = touches[0].pageY - touches[1].pageY;
    return Math.sqrt(dx * dx + dy * dy);
}

function getCenter(touches) {
    return {
        x: (touches[0].pageX + touches[1].pageX) / 2,
        y: (touches[0].pageY + touches[1].pageY) / 2
    };
}

function loadTextFile(files) {
    textPages = [];
    const totalFiles = files.length;
    let processedFiles = 0;

    for (const file of files) {
        const reader = new FileReader();
        reader.onload = function(e) {
            let content = e.target.result;
            if (file.name.endsWith('.html')) {
                const div = document.createElement('div');
                div.innerHTML = content;
                content = div.textContent;
            }
            content = autoCorrectSentenceBreaks(content);
            textPages.push(content);
            processedFiles++;
            showProgress('Processing text file', Math.round((processedFiles / totalFiles) * 100));

            if (processedFiles === totalFiles) {
                const fileKey = files[0].name;
                lastTappedFile = fileKey;
                const savedPosition = loadLastTappedPosition(fileKey);
                currentPageIndex = savedPosition ? savedPosition.pageIndex : 0;
                lastTappedSentenceIndex = savedPosition ? savedPosition.sentenceIndex : -1;
                renderTextPage();
                document.getElementById('dictionary-section').classList.add('hidden');
                document.getElementById('reader-section').classList.add('visible');
                document.getElementById('text-content').style.display = 'block';
                hideProgress();
            }
        };
        reader.readAsText(file);
    }
}

function renderTextPage() {
    if (textPages.length === 0) {
        document.getElementById('text-content').innerHTML = 'No text to display.';
        document.getElementById('pagination').innerHTML = '';
        return;
    }
    const textContentDiv = document.getElementById('text-content');
    const currentText = textPages[currentPageIndex];
    sentences = currentText.split(/\r?\n/).filter(line => line.trim() !== '');
    textContentDiv.innerHTML = sentences.map((line, index) => 
        `<span data-sentence-index="${index}">${line.trim()}</span>`
    ).join('<br>');
    textContentDiv.style.display = 'block';
    currentSentenceIndex = lastTappedSentenceIndex >= 0 ? lastTappedSentenceIndex : -1;
    updatePagination();
}

function updatePagination() {
    const paginationDiv = document.getElementById('pagination');
    paginationDiv.innerHTML = '';
    if (textPages.length > 1) {
        const prevButton = document.createElement('button');
        prevButton.id = 'prev-page';
        prevButton.textContent = '⬅️ Prev';
        prevButton.disabled = currentPageIndex === 0;
        prevButton.onclick = () => changePage(-1);

        const pageInfo = document.createElement('span');
        pageInfo.id = 'page-info';
        pageInfo.textContent = `Page ${currentPageIndex + 1} of ${textPages.length}`;

        const nextButton = document.createElement('button');
        nextButton.id = 'next-page';
        nextButton.textContent = 'Next ➡️';
        nextButton.disabled = currentPageIndex === textPages.length - 1;
        nextButton.onclick = () => changePage(1);

        paginationDiv.appendChild(prevButton);
        paginationDiv.appendChild(pageInfo);
        paginationDiv.appendChild(nextButton);
    }
}

function changePage(direction) {
    const newIndex = currentPageIndex + direction;
    if (newIndex >= 0 && newIndex < textPages.length) {
        stopSpeech();
        currentPageIndex = newIndex;
        lastTappedSentenceIndex = -1;
        renderTextPage();
        if (lastTappedFile) {
            saveLastTappedPosition(lastTappedFile, lastTappedSentenceIndex, currentPageIndex);
        }
    }
}

async function loadPDF(files) {
    textPages = [];
    const totalFiles = files.length;
    let processedFiles = 0;

    const processFile = async (file) => {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const typedarray = new Uint8Array(e.target.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        let pageText = textContent.items.map(item => item.str).join(' ');
                        pageText = autoCorrectSentenceBreaks(pageText);
                        textPages.push(pageText);
                        showProgress(`Processing PDF (File ${processedFiles + 1}/${totalFiles}, Page ${i}/${pdf.numPages})`,
                            Math.round((processedFiles + i / pdf.numPages) / totalFiles * 100));
                    }
                    pdf.destroy();
                    resolve();
                } catch (error) {
                    reject(error);
                }
            };
            reader.readAsArrayBuffer(file);
        });
    };

    try {
        for (const file of files) {
            await processFile(file);
            processedFiles++;
        }
        const fileKey = files[0].name;
        lastTappedFile = fileKey;
        const savedPosition = loadLastTappedPosition(fileKey);
        currentPageIndex = savedPosition ? savedPosition.pageIndex : 0;
        lastTappedSentenceIndex = savedPosition ? savedPosition.sentenceIndex : -1;
        renderTextPage();
        document.getElementById('dictionary-section').classList.add('hidden');
        document.getElementById('reader-section').classList.add('visible');
        document.getElementById('text-content').style.display = 'block';
        hideProgress();
    } catch (error) {
        console.error('Error processing PDF:', error);
        document.getElementById('text-content').innerHTML = 'Error processing PDF.';
        hideProgress();
    }
}

function populateVoiceList() {
    if (!isTTSSupported) {
        return;
    }
    voices = window.speechSynthesis.getVoices();
    defaultEnglishVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google')) || voices.find(v => v.lang.startsWith('en'));
    defaultHindiVoice = voices.find(v => v.lang.startsWith('hi') && v.name.includes('Google')) || voices.find(v => v.lang.startsWith('hi'));
    defaultOdiaVoice = voices.find(v => v.lang.startsWith('or') && v.name.includes('Google')) || voices.find(v => v.lang.startsWith('or'));
}

function speakPopup() {
    if (!isTTSSupported) return;
    const text = document.getElementById('popup-speak').getAttribute('data-word');
    if (!text) {
        alert("No text available.");
        return;
    }
    stopSpeech();
    const voiceMap = {
        'or': defaultOdiaVoice,
        'hi': defaultHindiVoice,
        'en': defaultEnglishVoice
    };
    speechUtterances = [];
    activeUtterances = 0;
    ['or', 'hi', 'en'].forEach(langPrefix => {
        const filteredText = filterTextByLanguage(text, langPrefix);
        if (filteredText) {
            const voice = voiceMap[langPrefix];
            if (voice) {
                const utterance = new SpeechSynthesisUtterance(filteredText);
                utterance.voice = voice;
                utterance.lang = voice.lang;
                utterance.rate = 0.7;
                utterance.pitch = 1.0;
                utterance.volume = 1.0;
                utterance.onend = () => {
                    activeUtterances--;
                    if (activeUtterances === 0) {
                        document.getElementById('popup-speak').disabled = false;
                        document.getElementById('popup-stop').disabled = true;
                    }
                };
                speechUtterances.push(utterance);
                activeUtterances++;
            }
        }
    });
    if (activeUtterances > 0) {
        speechUtterances.forEach(utterance => window.speechSynthesis.speak(utterance));
        document.getElementById('popup-speak').disabled = true;
        document.getElementById('popup-stop').disabled = false;
    } else {
        document.getElementById('popup-speak').disabled = false;
        document.getElementById('popup-stop').disabled = true;
    }
}

function playSpeech() {
    if (!isTTSSupported) {
        document.getElementById('processing-status').textContent = 'Text-to-speech is not supported in this browser.';
        return;
    }
    if (!sentences.length) {
        document.getElementById('processing-status').textContent = 'No text to read';
        return;
    }
    if (isReadingAloud && isPaused) {
        window.speechSynthesis.resume();
        isPaused = false;
        document.getElementById('play-btn').textContent = '⏸️';
        document.getElementById('processing-status').textContent = 'Resuming reading...';
        return;
    } else if (isReadingAloud) {
        window.speechSynthesis.pause();
        isPaused = true;
        document.getElementById('play-btn').textContent = '▶️';
        document.getElementById('processing-status').textContent = 'Paused reading';
        return;
    }

    stopSpeech();
    isReadingAloud = true;
    isPaused = false;
    currentSentenceIndex = lastTappedSentenceIndex >= 0 ? lastTappedSentenceIndex : (currentSentenceIndex >= sentences.length - 1 ? 0 : currentSentenceIndex + 1);
    document.getElementById('play-btn').textContent = '⏸️';
    document.getElementById('processing-status').textContent = 'Reading...';
    readNextSentence();
}

function readNextSentence() {
    if (!isTTSSupported) {
        document.getElementById('processing-status').textContent = 'Text-to-speech is not supported in this browser.';
        return;
    }
    if (currentSentenceIndex >= sentences.length || !isReadingAloud) {
        stopSpeech();
        if (currentSentenceIndex >= sentences.length && lastTappedFile) {
            clearLastTappedPosition(lastTappedFile);
            lastTappedSentenceIndex = -1;
        }
        return;
    }
    const sentenceSpans = document.getElementById('text-content').querySelectorAll('span');
    sentenceSpans.forEach(span => span.classList.remove('highlight'));
    if (sentenceSpans[currentSentenceIndex]) {
        sentenceSpans[currentSentenceIndex].classList.add('highlight');
        const textContentDiv = document.getElementById('text-content');
        const currentSpan = sentenceSpans[currentSentenceIndex];
        const spanRect = currentSpan.getBoundingClientRect();
        const containerRect = textContentDiv.getBoundingClientRect();
        textContentDiv.scrollTop += spanRect.top - containerRect.top - (containerRect.height / 2) + (spanRect.height / 2);
    }
    const text = sentences[currentSentenceIndex];
    const voiceMap = { 
        'hi': defaultHindiVoice,
        'or': defaultOdiaVoice,
        'en': defaultEnglishVoice
    };
    speechUtterances = [];
    activeUtterances = 0;
    let usedVoicesCount = 0;
    ['hi', 'or', 'en'].forEach(langPrefix => {
        const filteredText = filterTextByLanguage(text, langPrefix);
        if (filteredText) {
            const voice = voiceMap[langPrefix];
            if (voice) {
                const utterance = new SpeechSynthesisUtterance(filteredText);
                utterance.voice = voice;
                utterance.lang = voice.lang;
                utterance.rate = 0.7;
                utterance.pitch = 1.0;
                utterance.volume = 1.0;
                utterance.onend = () => {
                    activeUtterances--;
                    if (activeUtterances === 0 && isReadingAloud) {
                        if (currentSentenceIndex < sentences.length - 1) {
                            currentSentenceIndex++;
                            if (lastTappedFile) {
                                saveLastTappedPosition(lastTappedFile, currentSentenceIndex, currentPageIndex);
                            }
                            readNextSentence();
                        } else {
                            stopSpeech();
                            document.getElementById('processing-status').textContent = 'Finished reading page';
                            if (lastTappedFile) {
                                clearLastTappedPosition(lastTappedFile);
                                lastTappedSentenceIndex = -1;
                            }
                        }
                    }
                };
                speechUtterances.push(utterance);
                activeUtterances++;
                usedVoicesCount++;
            }
        }
    });
    if (activeUtterances > 0) {
        speechUtterances.forEach(utterance => window.speechSynthesis.speak(utterance));
        document.getElementById('play-btn').disabled = false;
        document.getElementById('stop-btn').disabled = false;
        document.getElementById('processing-status').textContent = `Reading with ${usedVoicesCount} voice${usedVoicesCount > 1 ? 's' : ''}...`;
    } else {
        stopSpeech();
        document.getElementById('processing-status').textContent = 'No text available for reading';
    }
}

function stopSpeech() {
    if (isTTSSupported) {
        window.speechSynthesis.cancel();
    }
    speechUtterances = [];
    activeUtterances = 0;
    isReadingAloud = false;
    isPaused = false;
    if (isTTSSupported) {
        document.getElementById('play-btn').textContent = '🗣️';
        document.getElementById('play-btn').disabled = false;
        document.getElementById('stop-btn').disabled = true;
        document.getElementById('result-speak').disabled = resultText ? false : true;
        document.getElementById('result-stop').disabled = true;
        document.getElementById('popup-speak').disabled = false;
        document.getElementById('popup-stop').disabled = true;
    }
    const sentenceSpans = document.getElementById('text-content').querySelectorAll('span');
    sentenceSpans.forEach(span => {
        span.classList.remove('highlight');
        span.style.display = 'inline';
    });
    document.getElementById('processing-status').textContent = '';
}

function exportText() {
    if (textPages.length === 0) return;
    const text = textPages.join('\n\n');
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'exported_text.txt';
    a.click();
    URL.revokeObjectURL(url);
}

function handleTextSelection(event) {
    if (!document.getElementById('reader-section').classList.contains('visible')) return;

    const selection = window.getSelection();
    const selectedText = selection.toString().trim();

    if (selectedText) {
        const textContentDiv = document.getElementById('text-content');
        const range = selection.getRangeAt(0);
        const startContainer = range.startContainer;
        let spanElement = startContainer.nodeType === Node.ELEMENT_NODE ? startContainer : startContainer.parentElement;

        if (spanElement.tagName === 'SPAN' && spanElement.hasAttribute('data-sentence-index')) {
            const sentenceIndex = parseInt(spanElement.getAttribute('data-sentence-index'), 10);
            lastTappedSentenceIndex = sentenceIndex;
            if (lastTappedFile) {
                saveLastTappedPosition(lastTappedFile, lastTappedSentenceIndex, currentPageIndex);
            }
        }

        // Split the selected text into words and find a single word if possible
        const words = selectedText.split(/\s+/).filter(w => w.trim());
        let wordToSearch = selectedText;

        // If the selection is within a single span and contains one word, use that word
        if (words.length === 1) {
            wordToSearch = words[0].replace(/[^A-Za-z\u0900-\u097F\u0B00-\u0B7F]/g, '').trim();
        } else if (spanElement.tagName === 'SPAN') {
            // If multiple words are selected, try to find the word at the cursor position
            const rangeRect = range.getBoundingClientRect();
            const text = spanElement.textContent;
            const wordsInSpan = text.split(/\s+/).filter(w => w.trim());
            const charIndex = range.startOffset;
            let currentPos = 0;

            for (const w of wordsInSpan) {
                const wordStart = text.indexOf(w, currentPos);
                const wordEnd = wordStart + w.length;
                if (charIndex >= wordStart && charIndex <= wordEnd) {
                    wordToSearch = w.replace(/[^A-Za-z\u0900-\u097F\u0B00-\u0B7F]/g, '').trim();
                    break;
                }
                currentPos = wordEnd;
            }
        }

        showPopup(wordToSearch);
    }
}

function updateImageTransform(img) {
    img.style.transform = `translate(${currentPosX}px, ${currentPosY}px) scale(${currentScale})`;
}

function handleTouchStart(e) {
    if (e.touches.length === 2) {
        e.preventDefault();
        pinching = true;
        initialDist = getDistance(e.touches);
        initialCenter = getCenter(e.touches);
        initialScale = currentScale;
        initialPosX = currentPosX;
        initialPosY = currentPosY;
    } else if (e.touches.length === 1) {
        isDragging = true;
        lastTouchX = e.touches[0].pageX;
        lastTouchY = e.touches[0].pageY;
    }
}

function handleTouchMove(e, img) {
    if (pinching && e.touches.length === 2) {
        e.preventDefault();
        let newDist = getDistance(e.touches);
        let newScale = initialScale * (newDist / initialDist);
        newScale = Math.max(1, Math.min(newScale, 5));
        let vpX = initialCenter.x;
        let vpY = initialCenter.y;
        let imageX = (vpX - initialPosX) / initialScale;
        let imageY = (vpY - initialPosY) / initialScale;
        currentScale = newScale;
        currentPosX = vpX - imageX * currentScale;
        currentPosY = vpY - imageY * currentScale;
        updateImageTransform(img);
    } else if (isDragging && e.touches.length === 1) {
        e.preventDefault();
        let deltaX = e.touches[0].pageX - lastTouchX;
        let deltaY = e.touches[0].pageY - lastTouchY;
        currentPosX += deltaX;
        currentPosY += deltaY;
        lastTouchX = e.touches[0].pageX;
        lastTouchY = e.touches[0].pageY;
        updateImageTransform(img);
    }
}

function handleTouchEnd(e) {
    pinching = false;
    isDragging = false;
}

let pinching = false;
let isDragging = false;
let initialDist = 0;
let initialCenter = {x: 0, y: 0};
let initialScale = 1;
let initialPosX = 0;
let initialPosY = 0;
let currentScale = 1;
let currentPosX = 0;
let currentPosY = 0;
let lastTouchX = 0;
let lastTouchY = 0;

function showFullScreenImage(src) {
    if (fullScreenImage) {
        fullScreenImage.remove();
        fullScreenImage = null;
        return;
    }
    fullScreenImage = document.createElement('div');
    fullScreenImage.style.position = 'fixed';
    fullScreenImage.style.top = '0';
    fullScreenImage.style.left = '0';
    fullScreenImage.style.width = '100vw';
    fullScreenImage.style.height = '100vh';
    fullScreenImage.style.backgroundColor = 'black';
    fullScreenImage.style.zIndex = '10001';
    fullScreenImage.style.overflow = 'hidden';
    const img = document.createElement('img');
    img.src = src;
    img.style.position = 'absolute';
    img.style.left = '0';
    img.style.top = '0';
    img.style.width = 'auto';
    img.style.height = 'auto';
    img.style.maxWidth = 'none';
    img.style.maxHeight = 'none';
    img.style.objectFit = 'none';
    fullScreenImage.appendChild(img);
    const closeBtn = document.createElement('button');
    closeBtn.textContent = 'X';
    closeBtn.style.position = 'absolute';
    closeBtn.style.top = '10px';
    closeBtn.style.right = '10px';
    closeBtn.style.zIndex = '10002';
    closeBtn.style.background = 'white';
    closeBtn.style.border = 'none';
    closeBtn.style.borderRadius = '50%';
    closeBtn.style.width = '30px';
    closeBtn.style.height = '30px';
    closeBtn.style.fontSize = '20px';
    closeBtn.style.cursor = 'pointer';
    closeBtn.onclick = () => showFullScreenImage();
    fullScreenImage.appendChild(closeBtn);
    document.body.appendChild(fullScreenImage);
    img.onload = () => {
        const containerWidth = fullScreenImage.clientWidth;
        const containerHeight = fullScreenImage.clientHeight;
        const imgWidth = img.naturalWidth;
        const imgHeight = img.naturalHeight;
        const scaleX = containerWidth / imgWidth;
        const scaleY = containerHeight / imgHeight;
        initialScale = Math.min(scaleX, scaleY);
        currentScale = initialScale;
        currentPosX = (containerWidth - imgWidth * currentScale) / 2;
        currentPosY = (containerHeight - imgHeight * currentScale) / 2;
        updateImageTransform(img);
    };
    fullScreenImage.addEventListener('touchstart', handleTouchStart);
    fullScreenImage.addEventListener('touchmove', (e) => handleTouchMove(e, img));
    fullScreenImage.addEventListener('touchend', handleTouchEnd);
}

async function initializeApp() {
    if (!localStorage.getItem('customDictionary')) {
        localStorage.setItem('customDictionary', JSON.stringify({}));
    }
    if (!localStorage.getItem('lastTappedPositions')) {
        localStorage.setItem('lastTappedPositions', JSON.stringify({}));
    }
    if (!localStorage.getItem('imageVisibility')) {
        localStorage.setItem('imageVisibility', JSON.stringify({}));
    }
    if (!localStorage.getItem('cachedImages')) {
        localStorage.setItem('cachedImages', JSON.stringify({}));
    }
    imageVisibility = JSON.parse(localStorage.getItem('imageVisibility') || '{}');
    cachedImages = JSON.parse(localStorage.getItem('cachedImages') || '{}');

    const isCached = localStorage.getItem('cachePopulated') === 'true' && await isCachePopulated();
    
    if (!isCached) {
        showProgress('Initializing app', 0);
        await cacheFiles();
        await initDatabases();
        showProgress('Initializing app', 100);
        hideProgress();
    } else {
        try {
            await initDatabases();
        } catch (error) {
            console.error('Error initializing databases offline:', error);
            document.getElementById('results').innerHTML = 'Error loading dictionaries offline. Please check your internet connection.';
        }
    }

    if ('serviceWorker' in navigator) {
        const swCode = `
            self.addEventListener('install', (event) => {
                event.waitUntil(
                    caches.open('${cacheName}').then((cache) => {
                        return cache.addAll(${JSON.stringify(filesToCache)});
                    })
                );
            });

            self.addEventListener('fetch', (event) => {
                event.respondWith(
                    caches.match(event.request).then((response) => {
                        return response || fetch(event.request).then((fetchResponse) => {
                            return caches.open('${cacheName}').then((cache) => {
                                cache.put(event.request, fetchResponse.clone());
                                return fetchResponse;
                            });
                        });
                    })
                );
            });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).then(reg => {
            console.log('Service Worker registered');
        }).catch(err => {
            console.error('Service Worker registration failed:', err);
        });
    }

    populateVoiceList();
    if (isTTSSupported) {
        const synth = window.speechSynthesis;
        if (synth.onvoiceschanged !== undefined) {
            synth.onvoiceschanged = populateVoiceList;
        }
        // Show TTS elements
        document.querySelectorAll('.tts-hidden').forEach(el => el.classList.remove('tts-hidden'));
        document.getElementById('voice-controls').classList.remove('tts-hidden');
    } else {
        // Hide TTS elements
        document.querySelectorAll('.tts-hidden').forEach(el => el.classList.add('tts-hidden'));
        document.getElementById('voice-controls').classList.add('tts-hidden');
        console.warn('Text-to-speech is not supported in this browser.');
    }

    const searchInput = document.getElementById('searchInput');
    const fileUpload = document.getElementById('file-upload');
    const fileUploadReader = document.getElementById('file-upload-reader');
    const closeReader = document.getElementById('close-reader');
    const popupClose = document.getElementById('popup-close');
    const popupSpeak = document.getElementById('popup-speak');
    const popupStop = document.getElementById('popup-stop');
    const resultSpeak = document.getElementById('result-speak');
    const resultStop = document.getElementById('result-stop');
    const playBtn = document.getElementById('play-btn');
    const stopBtn = document.getElementById('stop-btn');
    const exportBtn = document.getElementById('export-btn');
    const editDictionaryBtn = document.getElementById('edit-dictionary-btn');
    const editDictionaryForm = document.getElementById('edit-dictionary-form');
    const textEditBtn = document.getElementById('text-edit-btn');
    const debouncedSuggestions = debounce((word) => {
        loadSuggestions(word);
    }, 700);

    searchInput.addEventListener('input', () => {
        const word = searchInput.value;
        debouncedSuggestions(word);
    });

    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const word = searchInput.value;
            searchWord(word);
        }
    });

    searchInput.addEventListener('click', clearInputOnClick);

    function handleFileUpload(event) {
        const files = Array.from(event.target.files);
        if (!files.length) return;
        stopSpeech();
        const pdfFiles = files.filter(f => f.name.endsWith('.pdf'));
        const textFiles = files.filter(f => f.name.endsWith('.txt') || f.name.endsWith('.html'));
        
        if (pdfFiles.length > 0) {
            loadPDF(pdfFiles);
        }
        if (textFiles.length > 0) {
            loadTextFile(textFiles);
        }
    }

    fileUpload.addEventListener('change', handleFileUpload);
    fileUploadReader.addEventListener('change', handleFileUpload);

    closeReader.addEventListener('click', () => {
        stopSpeech();
        document.getElementById('reader-section').classList.remove('visible');
        document.getElementById('dictionary-section').classList.remove('hidden');
        document.getElementById('text-content').innerHTML = '';
        document.getElementById('text-content').style.display = 'block';
        document.getElementById('text-edit-area').style.display = 'none';
        textPages = [];
        pdfDoc = null;
        lastTappedFile = null;
        lastTappedSentenceIndex = -1;
    });

    popupClose.addEventListener('click', () => {
        stopSpeech();
        document.getElementById('popup').style.display = 'none';
        document.getElementById('popup').classList.remove('visible');
    });

    if (isTTSSupported) {
        popupSpeak.addEventListener('click', speakPopup);
        popupStop.addEventListener('click', stopSpeech);
        resultSpeak.addEventListener('click', speakResults);
        resultStop.addEventListener('click', stopSpeech);
        playBtn.addEventListener('click', playSpeech);
        stopBtn.addEventListener('click', stopSpeech);
    }

    exportBtn.addEventListener('click', exportText);

    editDictionaryBtn.addEventListener('click', () => {
        editDictionaryForm.classList.toggle('hidden');
    });

    editDictionaryForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const word = document.getElementById('searchInput').value.trim();
        if (!word) {
            alert('Please enter a search word first.');
            return;
        }
        const english = document.getElementById('edit-english').value.trim();
        const odia = document.getElementById('edit-odia').value.trim();
        const odia_spelling = document.getElementById('edit-odia-spelling').value.trim();
        const odia_meaning = document.getElementById('edit-odia-meaning').value.trim();
        let imageBase64 = '';
        const imageFile = document.getElementById('edit-image').files[0];
        if (imageFile) {
            imageBase64 = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(imageFile);
            });
        }
        saveCustomEntry(word, english, odia, odia_spelling, odia_meaning, document.getElementById('results'), imageBase64);
        editDictionaryForm.classList.add('hidden');
        editDictionaryForm.reset();
        document.getElementById('edit-image').value = '';
    });

    textEditBtn.addEventListener('click', toggleEditText);

    // Add event listener for text selection
    document.getElementById('text-content').addEventListener('mouseup', handleTextSelection);
    document.getElementById('text-content').addEventListener('touchend', handleTextSelection);
}

initializeApp();
</script>
</body>
